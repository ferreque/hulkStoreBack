name: CD — Deploy to Vercel

on:
  push:
    branches: [main]

# Vercel deploys automatically via GitHub integration on push to main.
# No additional steps needed here.
jobs:
  notify:
    name: Deploy triggered
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deploy handed off to Vercel
        run: echo "Vercel native integration handles deployment on push to main."
